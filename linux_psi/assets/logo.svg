<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Linux PSI">
  <title>Linux PSI</title>
  <desc>Three vertical bars in rising height representing CPU, memory, and I/O pressure stall information</desc>

  <!-- Baseline ground line -->
  <line x1="20" y1="180" x2="180" y2="180" stroke="#9e9e9e" stroke-width="2" stroke-linecap="round"/>

  <!-- CPU pressure bar (low, green) -->
  <rect x="35" y="110" width="34" height="68" rx="6" fill="#4caf50"/>

  <!-- Memory pressure bar (medium, amber) -->
  <rect x="83" y="70" width="34" height="108" rx="6" fill="#ffc107"/>

  <!-- I/O pressure bar (high, red) -->
  <rect x="131" y="30" width="34" height="148" rx="6" fill="#f44336"/>

  <!-- Optional: small tick at top of red bar suggesting "alarm" -->
  <circle cx="148" cy="22" r="6" fill="#f44336" opacity="0.5"/>
  <circle cx="148" cy="22" r="3" fill="#f44336"/>
</svg>
