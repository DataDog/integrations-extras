# Policy for: .gitlab-ci.yml release-auto job in DataDog/integrations-extras
#
# This policy grants the GitLab CI release-auto job permission to push signed
# release commits and tags to this repository. The job runs on pushes to the
# master branch.
#
# Naming convention:
#   self:     Only this repository (DataDog/integrations-extras) can use this policy
#   gitlab:   This policy is for GitLab CI (not GitHub Actions)
#   release:  Grants permission to push release commits and tags
#   master:   Restricted to the protected master branch
#
# Security model:
#   - Pipeline must run from master
#   - Pipeline must be triggered by a push event (not scheduled or manual)
#   - CI config must be committed to the same branch
#
# Permissions granted:
#   - contents: write  - Push signed commits and release tags to the repository
#
# Usage in .gitlab-ci.yml:
#   id_tokens:
#     DDOCTOSTS_ID_TOKEN:
#       aud: dd-octo-sts
#   script:
#     - GITHUB_TOKEN=$(dd-octo-sts token --scope DataDog/integrations-extras --policy self.gitlab.release.master)

issuer: https://gitlab.ddbuild.io

subject: project_path:DataDog/integrations-extras:ref_type:branch:ref:master

claim_pattern:
  ci_config_ref_uri: gitlab\.ddbuild\.io/DataDog/integrations-extras//\.gitlab-ci\.yml@refs/heads/master
  pipeline_source: push
  project_path: DataDog/integrations-extras
  ref_path: refs/heads/master

permissions:
  contents: write
