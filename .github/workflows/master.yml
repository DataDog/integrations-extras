name: Master

on:
  push:
    branches:
    - master
  workflow_dispatch:  # temporary — remove after verification

jobs:
  test:
    uses: ./.github/workflows/test-all.yml
    with:
      repo: extras
    secrets: inherit
    permissions:
       # needed for codecov in test-target.yml, allows the action to get a JWT signed by Github
       id-token: write
       # needed for compute-matrix in test-target.yml
       contents: read

  upload-coverage:
    needs:
    - test
    if: >
      !github.event.repository.private &&
      (success() || failure())
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Download all coverage artifacts
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        pattern: coverage-*
        path: coverage-reports
        merge-multiple: false

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
      with:
        use_oidc: true
        directory: coverage-reports
        fail_ci_if_error: false

    - name: Get Datadog credentials
      id: dd-sts
      continue-on-error: true
      uses: DataDog/dd-sts-action@2e8187910199bd93129520183c093e19aa585c75 # v1.0.0
      with:
        policy: integrations-extras
    - name: Upload coverage to Datadog
      if: steps.dd-sts.outputs.api_key != ''
      continue-on-error: true
      uses: DataDog/coverage-upload-github-action@9bbbf86d16f7db1b14c5b885e61cf0d96053686a # v1.0.0
      with:
        api_key: ${{ steps.dd-sts.outputs.api_key }}
        files: coverage-reports
        format: cobertura

  publish-test-results:
    needs:
    - test
    if: success() || failure()
    concurrency:
      group: test-results

    permissions: # For test-results-master.yml
      checks: write
      pull-requests: write
      contents: write

    uses: DataDog/integrations-core/.github/workflows/test-results-master.yml@574d63ba88365ffbab915280ceddbaa333c63d6a # master
    secrets: inherit
