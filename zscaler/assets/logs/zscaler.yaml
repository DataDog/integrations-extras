pipeline:
  type: pipeline
  name: Zscaler
  enabled: true
  filter:
    query: source:zscaler
  processors:
    - type: attribute-remapper
      name: Map `event` to `zscaler`
      enabled: true
      sources:
        - event
      sourceType: attribute
      target: zscaler
      targetType: attribute
      preserveSource: false
      overrideOnConflict: false
    - type: pipeline
      name: Define sourcetype for alert log
      enabled: true
      filter:
        query: -@sourcetype:* @alertId:*
      processors:
        - type: string-builder-processor
          name: set `sourcetype` attribute
          enabled: true
          template: zscalernss-alert
          target: sourcetype
          replaceMissing: true
    - type: service-remapper
      name: Define `sourcetype` as the official service of the log
      enabled: true
      sources:
        - sourcetype
    - type: grok-parser
      name: Convert `datetime` to epoch timestamp
      enabled: true
      source: zscaler.datetime
      samples:
        - 2021-09-22 17:53:52
        - Wed Sep 22 17:54:17 2021
      grok:
        supportRules: ""
        matchRules: |-
          date_1 %{date("yyyy-MM-dd HH:mm:ss"):date}
          date_2 %{date("EEE MMM dd HH:mm:ss yyyy"):date}
    - type: grok-parser
      name: Scale `createTime` (alert logs) to epoch ms `date`
      enabled: true
      source: createTime
      samples:
        - "1755569028"
      grok:
        supportRules: ""
        matchRules: |-
          create_time %{integer:date:scale(1000)}
    - type: date-remapper
      name: Define `date` as the official date of the log
      enabled: true
      sources:
        - date
    - type: attribute-remapper
      name: Map `user` and `login` to `usr.id`
      enabled: true
      sources:
        - zscaler.user
        - zscaler.login
      sourceType: attribute
      target: usr.id
      targetType: attribute
      preserveSource: true
      overrideOnConflict: false
    - type: grok-parser
      name: Convert `dlpdictionaries` field into an array
      enabled: true
      source: zscaler.dlpdictionaries
      samples:
        - "Credit Cards: Detect leakage of credit card information|Social
          Security Number (US): Detect leakage of United States Social Security
          Numbers|US Passport Number"
      grok:
        supportRules: ""
        matchRules: dlpdictionaries_rule %{data:zscaler.dlpdictionaries:array("[]","|")}
    - type: grok-parser
      name: Convert `dlpengine` field into an array
      enabled: true
      source: zscaler.dlpengine
      samples:
        - HIPAA|PCI
      grok:
        supportRules: ""
        matchRules: dlpengine_rule %{data:zscaler.dlpengine:array("[]","|")}
    - type: grok-parser
      name: Convert `dlpdicthitcount` field into an array
      enabled: true
      source: zscaler.dlpdicthitcount
      samples:
        - 6|6|7
      grok:
        supportRules: ""
        matchRules: dlpdicthitcount_rule %{data:zscaler.dlpdicthitcount:array("[]","|")}
    - type: pipeline
      name: Web
      enabled: true
      filter:
        query: service:zscalernss-web
      processors:
        - type: attribute-remapper
          name: Map `reqversion` to `http.version`
          enabled: true
          sources:
            - zscaler.reqversion
          sourceType: attribute
          target: http.version
          targetType: attribute
          preserveSource: false
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `clientpublicIP` to `network.client.ip`
          enabled: true
          sources:
            - zscaler.clientpublicIP
          sourceType: attribute
          target: network.client.ip
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `clt_sport` to `network.client.port`
          enabled: true
          sources:
            - zscaler.clt_sport
          sourceType: attribute
          target: network.client.port
          targetType: attribute
          preserveSource: false
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `serverip` to `network.destination.ip`
          enabled: true
          sources:
            - zscaler.serverip
          sourceType: attribute
          target: network.destination.ip
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `srv_dport` to `network.destination.port`
          enabled: true
          sources:
            - zscaler.srv_dport
          sourceType: attribute
          target: network.destination.port
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `action` to `evt.outcome`
          enabled: true
          sources:
            - zscaler.action
          sourceType: attribute
          target: evt.outcome
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `requestmethod` to `http.method`
          enabled: true
          sources:
            - zscaler.requestmethod
          sourceType: attribute
          target: http.method
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `status` to `http.status_code`
          enabled: true
          sources:
            - zscaler.status
          sourceType: attribute
          target: http.status_code
          targetType: attribute
          preserveSource: true
          overrideOnConflict: true
        - type: attribute-remapper
          name: Map `refererURL` to `http.referer`
          enabled: true
          sources:
            - zscaler.refererURL
          sourceType: attribute
          target: http.referer
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `useragent` to `http.useragent`
          enabled: true
          sources:
            - zscaler.useragent
          sourceType: attribute
          target: http.useragent
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: user-agent-parser
          name: Extracting useragent details from htttp.useragent
          enabled: true
          sources:
            - http.useragent
          target: http.useragent_details
          encoded: false
          combineVersionDetails: false
        - type: string-builder-processor
          name: Prepend protocol to URL
          enabled: true
          template: "%{zscaler.protocol}://%{zscaler.url}"
          target: zscaler.url_full
          replaceMissing: false
        - type: attribute-remapper
          name: Map `url_full` to `http.url`
          enabled: true
          sources:
            - zscaler.url_full
          sourceType: attribute
          target: http.url
          targetType: attribute
          preserveSource: false
          overrideOnConflict: false
        - type: url-parser
          name: Extracting URL details from http.url
          enabled: true
          sources:
            - http.url
          target: http.url_details
          normalizeEndingSlashes: false
        - type: grok-parser
          name: Convert `threatseverity` field into lowercase
          enabled: true
          source: zscaler.threatseverity
          samples:
            - Critical
          grok:
            supportRules: ""
            matchRules: lower_rule %{notSpace:zscaler.threatseverity:lowercase}
        - name: Lookup on `threatseverity` to `status`
          enabled: true
          source: zscaler.threatseverity
          target: status
          lookupTable: |-
            critical,critical
            high,warning 
            medium,warning 
            low,notice 
            none,info
          type: lookup-processor
    - type: pipeline
      name: Firewall
      enabled: true
      filter:
        query: service:zscalernss-fw
      processors:
        - type: attribute-remapper
          name: Map `csip` to `network.client.ip`
          enabled: true
          sources:
            - zscaler.csip
          sourceType: attribute
          target: network.client.ip
          targetType: attribute
          preserveSource: false
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `csport` to `network.client.port`
          enabled: true
          sources:
            - zscaler.csport
          sourceType: attribute
          target: network.client.port
          targetType: attribute
          preserveSource: false
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `cdip` to `network.destination.ip`
          enabled: true
          sources:
            - zscaler.cdip
          sourceType: attribute
          target: network.destination.ip
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `cdport` to `network.destination.port`
          enabled: true
          sources:
            - zscaler.cdport
          sourceType: attribute
          target: network.destination.port
          targetType: attribute
          preserveSource: false
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `action` to `evt.outcome`
          enabled: true
          sources:
            - zscaler.action
          sourceType: attribute
          target: evt.outcome
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `inbytes` to `network.bytes_read`
          enabled: true
          sources:
            - zscaler.inbytes
          sourceType: attribute
          target: network.bytes_read
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: attribute-remapper
          name: Map `outbytes` to `network.bytes_written`
          enabled: true
          sources:
            - zscaler.outbytes
          sourceType: attribute
          target: network.bytes_written
          targetType: attribute
          preserveSource: true
          overrideOnConflict: false
        - type: grok-parser
          name: Convert `threatseverity` field into lowercase
          enabled: true
          source: zscaler.threatseverity
          samples:
            - Critical
          grok:
            supportRules: ""
            matchRules: lower_rule %{notSpace:zscaler.threatseverity:lowercase}
        - name: Lookup on `threatseverity` to `status`
          enabled: true
          source: zscaler.threatseverity
          target: status
          lookupTable: |-
            critical,critical
            high,warning 
            medium,warning 
            low,info
            none,info
          type: lookup-processor
    - type: pipeline
      name: DNS
      enabled: true
      filter:
        query: service:zscalernss-dns
      processors:
        - type: attribute-remapper
          name: Map `clt_sip` to `network.client.ip`
          enabled: true
          sources:
