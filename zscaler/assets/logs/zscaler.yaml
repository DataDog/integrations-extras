              sources:
                - zscaler.ipsrulelabel
              target: ocsf.finding_info.analytic.name
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `zscaler.ipsrulelabel` to `ocsf.finding_info.analytic.uid`
              sources:
                - zscaler.ipsrulelabel
              target: ocsf.finding_info.analytic.uid
              preserveSource: true
              overrideOnConflict: true
            - type: schema-remapper
              name: Map `zscaler.threatname`, `zscaler.rulelabel` to `ocsf.message`
              sources:
                - zscaler.threatname
                - zscaler.rulelabel
              target: ocsf.message
              preserveSource: true
              overrideOnConflict: true
            - type: schema-category-mapper
              name: ocsf.severity_id
              categories:
                - filter:
                    query: "@zscaler.threatseverity:Informational"
                  name: Informational
                  id: 1
                - filter:
                    query: "@zscaler.threatseverity:Low"
                  name: Low
                  id: 2
                - filter:
                    query: "@zscaler.threatseverity:Medium"
