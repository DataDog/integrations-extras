          name: Convert `filetypes` field into an array
          enabled: true
          source: zscaler.filetypes
          samples:
            - doc|pdf
          grok:
            supportRules: ""
            matchRules: filetypes_rule %{data:zscaler.filetypes:array("[]","|")}
        - type: grok-parser
          name: Convert `doctypes` field into an array
