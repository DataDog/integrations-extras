        - type: grok-parser
          name: Convert `filenames` field into an array
          enabled: true
          source: zscaler.filenames
          samples:
            - file_name_1.doc|file_name_2.pdf
          grok:
            supportRules: ""
            matchRules: filenames_rule %{data:zscaler.filenames:array("[]","|")}
        - type: grok-parser
