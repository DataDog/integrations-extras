id: fauna
backend_only: true
installation_sources: # list of all databricks logs sources set in the Data Jobs Init script
  - driver_stdout
  - driver_stderr
  - driver_logs
  - worker_stdout
  - worker_stderr
pipeline:
  type: pipeline
  name: DJM Databricks Agent logs
  enabled: true
  filter:
    query: source:(driver_stdout OR driver_stderr OR driver_logs OR worker_stdout OR worker_stderr)
  processors:
    - type: grok-parser
      name: Parsing Databricks default formats
      enabled: true
      source: message
      samples:
        - 2020-07-09 03:01:22 INFO  JobScheduler: Started JobScheduler
        - 2020-07-09 03:01:13 INFO  Master: Starting Spark master at spark://spark-master:7077
        - 2020-07-09 03:22:24 INFO  Worker: Executor app-20200709030119-0000/379 finished with state EXITED message Command exited with code 1 exitStatus 1
        - 2020-07-09 03:01:38 WARN  TaskSchedulerImpl: Initial job has not accepted any resources; check your cluster UI to ensure that workers are registered and have sufficient resources
      grok:
        supportRules: |
          _date %{date("yyyy-MM-dd HH:mm:ss"):timestamp}
          _status %{word:level}
          _logger_name %{regex("[^:]+"):logger.name}

        matchRules: |
          databricks_default %{_date} %{_status}\s+%{_logger_name}:\s+%{data:msg}
    - type: category-processor
      name: Databricks notebook stack traces processor
      enabled: true
      categories:
        - filter:
            query: '"Traceback"'
          name: error
      target: level
    - type: date-remapper
      name: Define `timestamp` as the official date of the log
      enabled: true
      sources:
        - timestamp
    - type: status-remapper
      name: Define `level` as the official status of the log
      enabled: true
      sources:
        - level
    - type: message-remapper
      name: Define `msg` as the official message of the log
      enabled: true
      sources:
        - msg
